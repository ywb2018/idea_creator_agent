# Idea Generation — full research pipeline for generating novel ideas
# Uses autonomous orchestration: the Chief dynamically decides which specialists
# to call and in what order, adapting to intermediate results.
# Best for: deep literature exploration and creative research idea generation.

name: idea_generation
description: >
  Full autonomous research pipeline for generating novel research ideas.
  All five specialist agents are available: searcher, analyst, synthesizer,
  and ideator. The chief dynamically orchestrates the team, adapting the
  research strategy based on intermediate findings.

orchestration:
  strategy: autonomous
  max_rounds: 20
  sequence: null
  verbose: true

model_defaults:
  chief: deepseek-chat
  searcher: deepseek-chat
  analyst: deepseek-chat
  synthesizer: deepseek-chat
  ideator: deepseek-chat

agents:
  - name: chief
    role: chief
    model: deepseek-chat
    tools: []
    max_iters: 15

  - name: searcher
    role: searcher
    model: deepseek-chat
    tools:
      - search_arxiv
      - get_paper_detail
    max_iters: 10

  - name: analyst
    role: analyst
    model: deepseek-chat
    tools:
      - get_paper_detail
    max_iters: 15

  - name: synthesizer
    role: synthesizer
    model: deepseek-chat
    tools:
      - search_arxiv
    max_iters: 10

  - name: ideator
    role: ideator
    model: deepseek-chat
    tools:
      - search_arxiv
    max_iters: 15
